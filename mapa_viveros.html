<body>
    <div class="container">
        <h1>Mapa de Viveros</h1>
        <div id="map"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <!-- Leaflet Control Geocoder JS -->
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <!-- Tu propio script -->
    <script>
        var map = L.map('map').setView([4.33646, -74.36378], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        var viveros = [
            { nombre: "Vivero El Paraíso", lat: 4.7153998, lng: -74.1233661 },
            { nombre: "Vivero La Arboleda", lat: 4.34500, lng: -74.36000 },
            { nombre: "Vivero Las Flores", lat: 4.33000, lng: -74.37000 }
        ];

        viveros.forEach(function(vivero) {
            var marker = L.marker([vivero.lat, vivero.lng]).addTo(map);
            marker.bindPopup(`<b>${vivero.nombre}</b><br>Ubicación del vivero.<br>Coordenadas: <a href="https://www.google.com/maps?q=${vivero.lat},${vivero.lng}" target="_blank">${vivero.lat.toFixed(6)}, ${vivero.lng.toFixed(6)}</a>`);
        });

        function onLocationFound(e) {
            var userLatLng = e.latlng;
            L.marker(userLatLng, { icon: L.icon({ iconUrl: 'https://unpkg.com/leaflet@1.7.1/dist/images/marker-icon-2x.png', iconSize: [25, 41] }) }).addTo(map)
                .bindPopup("Estás aquí.")
                .openPopup();

            L.circle(userLatLng, e.accuracy / 2).addTo(map);

            viveros.forEach(function(vivero) {
                var viveroLatLng = L.latLng(vivero.lat, vivero.lng);
                var distance = userLatLng.distanceTo(viveroLatLng);

                if (distance < 1000) { // 1000 metros = 1 km
                    L.popup()
                        .setLatLng(viveroLatLng)
                        .setContent(`<b>${vivero.nombre}</b><br>
                        Estás a ${Math.round(distance)} metros de este vivero.<br>Coordenadas: <a href="https://www.google.com/maps?q=${vivero.lat},${vivero.lng}" target="_blank">${vivero.lat.toFixed(6)}, ${vivero.lng.toFixed(6)}</a>`)
                        .openOn(map);
                }
            });
        }

        function onLocationError(e) {
            alert("No se pudo obtener la ubicación.");
        }

        // Agregar control de búsqueda
        L.Control.geocoder({
            geocoder: L.Control.Geocoder.nominatim(),
            defaultMarkGeocode: false
        }).on('markgeocode', function(e) {
            var bbox = e.geocode.bbox;
            var center = e.geocode.center;
            L.marker(center).addTo(map)
                .bindPopup(e.geocode.name)
                .openPopup();
            map.fitBounds(bbox);
        }).addTo(map);

        map.locate({ setView: true, maxZoom: 16, enableHighAccuracy: true });

        map.on('locationfound', onLocationFound);
        map.on('locationerror', onLocationError);
    </script>
