<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>ViveroOnline - Mapa de Viveros</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 75vh; width: 100%; }
        .vivero-popup h6 { color: #5cb85c; margin-bottom: 4px; }
        .vivero-popup a { color: #5cb85c; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="container-fluid p-0">
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark py-3 px-lg-5">
            <a href="index.html" class="navbar-brand">
                <h1 class="m-0 display-5 text-capitalize text-white"><span class="text-primary">Vivero</span>Online</h1>
            </a>
            <div class="collapse navbar-collapse justify-content-between px-3" id="navbarCollapse">
                <div class="navbar-nav mr-auto py-0">
                    <a href="index.html" class="nav-item nav-link">Inicio</a>
                    <a href="dashboard.html" class="nav-item nav-link">Dashboard</a>
                    <a href="mapa_viveros.html" class="nav-item nav-link active">Mapa</a>
                    <a href="contact.html" class="nav-item nav-link">Contacto</a>
                </div>
            </div>
        </nav>
    </div>

    <div class="container-fluid py-4">
        <div class="text-center mb-3">
            <h4 class="text-secondary mb-1">Explora</h4>
            <h2>Mapa de <span class="text-primary">Viveros</span></h2>
            <p class="text-muted" id="mapa-status">Cargando viveros...</p>
        </div>
        <div id="map"></div>
    </div>

    <!-- Footer -->
    <div class="container-fluid bg-dark text-white py-3">
        <p class="m-0 text-center text-white">
            &copy; <a class="text-primary font-weight-bold" href="#">ViveroOnline</a>. Todos los derechos reservados.
        </p>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script type="module">
        import { auth, db, onAuthStateChanged, collection, getDocs } from './firebase-config.js';

        const map = L.map('map').setView([4.6, -74.1], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // Icono personalizado verde
        const iconoVivero = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        async function cargarViverosEnMapa() {
            const querySnapshot = await getDocs(collection(db, 'viveros'));
            let conUbicacion = 0;
            let sinUbicacion = 0;
            const bounds = [];

            querySnapshot.forEach((docSnap) => {
                const v = docSnap.data();
                if (v.lat && v.lng) {
                    conUbicacion++;
                    bounds.push([v.lat, v.lng]);
                    const marker = L.marker([v.lat, v.lng], { icon: iconoVivero }).addTo(map);
                    marker.bindPopup(`
                        <div class="vivero-popup">
                            <h6>${v.nombre}</h6>
                            <p class="mb-1"><i class="fa fa-map-marker-alt"></i> ${v.ciudad}</p>
                            <p class="mb-1"><i class="fa fa-clock"></i> ${v.horario || 'Sin horario'}</p>
                            <p class="mb-2"><i class="fa fa-phone"></i> ${v.telefono || ''}</p>
                            <a href="vivero-detalle.html?id=${docSnap.id}">Ver catálogo →</a>
                        </div>
                    `);
                } else {
                    sinUbicacion++;
                }
            });

            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50] });
            }

            let msg = `${conUbicacion} vivero(s) en el mapa`;
            if (sinUbicacion > 0) msg += ` · ${sinUbicacion} sin ubicación registrada`;
            document.getElementById('mapa-status').textContent = msg;
        }

        // Ubicación del usuario
        map.locate({ enableHighAccuracy: true });
        map.on('locationfound', (e) => {
            L.marker(e.latlng).addTo(map)
                .bindPopup('<b>📍 Estás aquí</b>')
                .openPopup();
        });

        cargarViverosEnMapa();
    </script>

    <script type="module" src="js/auth-guard.js"></script>
</body>
</html>
