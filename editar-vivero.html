<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>ViveroOnline - Editar Vivero</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        .form-container {
            max-width: 700px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .form-group label { font-weight: 600; color: #555; }
        .form-control { padding: 12px; border-radius: 8px; }
        .form-control:focus {
            border-color: #5cb85c;
            box-shadow: 0 0 0 3px rgba(92,184,92,0.15);
        }
        .btn-guardar {
            background: #5cb85c; color: white;
            padding: 12px 30px; border: none;
            border-radius: 8px; font-size: 16px;
            font-weight: 600; width: 100%; cursor: pointer;
        }
        .btn-guardar:hover { background: #4cae4c; }
        .success-msg {
            display: none;
            background: #d4edda; color: #155724;
            padding: 15px; border-radius: 8px;
            margin-bottom: 20px; text-align: center;
        }
        .error-msg {
            display: none;
            background: #f8d7da; color: #721c24;
            padding: 15px; border-radius: 8px;
            margin-bottom: 20px; text-align: center;
        }
        #mapa-editar { height: 250px; border-radius: 8px; display:none; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="container-fluid p-0">
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark py-3 px-lg-5">
            <a href="index.html" class="navbar-brand">
                <h1 class="m-0 display-5 text-capitalize text-white"><span class="text-primary">Vivero</span>Online</h1>
            </a>
            <div class="navbar-nav ml-4">
                <a href="index.html" class="nav-item nav-link">Inicio</a>
                <a href="plants.html" class="nav-item nav-link">Plantas</a>
                <a href="mapa_viveros.html" class="nav-item nav-link">Mapa</a>
                <a href="contact.html" class="nav-item nav-link">Contacto</a>
            </div>
        </nav>
    </div>

    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-1"><span class="text-primary">Editar</span> tu Vivero</h2>
            <p class="text-center text-muted mb-4">Actualiza la información de tu vivero</p>

            <div id="success-msg" class="success-msg">✅ ¡Vivero actualizado exitosamente!</div>
            <div id="error-msg" class="error-msg"></div>

            <form id="form-editar">
                <div class="form-group mb-3">
                    <label>Nombre del vivero *</label>
                    <input type="text" class="form-control" id="nombre" required>
                </div>
                <div class="form-group mb-3">
                    <label>Descripción *</label>
                    <textarea class="form-control" id="descripcion" rows="3" required></textarea>
                </div>
                <div class="form-group mb-3">
                    <label>Ciudad *</label>
                    <input type="text" class="form-control" id="ciudad" required>
                </div>
                <div class="form-group mb-3">
                    <label>Dirección *</label>
                    <input type="text" class="form-control" id="direccion" required>
                </div>
                <div class="form-group mb-3">
                    <label>Teléfono *</label>
                    <input type="text" class="form-control" id="telefono" required>
                </div>
                <div class="form-group mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" id="email">
                </div>
                <div class="form-group mb-3">
                    <label>Horario de atención</label>
                    <input type="text" class="form-control" id="horario" placeholder="Ej: Lun-Sáb 8AM-6PM">
                </div>

                <!-- Ubicación -->
                <div class="form-group mb-4">
                    <label>Ubicación en el mapa</label>
                    <div class="d-flex align-items-center mb-2">
                        <button type="button" class="btn btn-outline-success mr-3" id="btn-ubicacion" onclick="obtenerUbicacion()">
                            <i class="fa fa-map-marker-alt mr-2"></i>Actualizar ubicación
                        </button>
                        <span id="ubicacion-status" class="text-muted small"></span>
                    </div>
                    <div id="mapa-editar"></div>
                    <input type="hidden" id="lat">
                    <input type="hidden" id="lng">
                </div>

                <button type="submit" class="btn-guardar">
                    <i class="fa fa-save mr-2"></i>Guardar Cambios
                </button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div class="container-fluid bg-dark text-white py-4">
        <p class="m-0 text-center">
            &copy; <a class="text-primary font-weight-bold" href="#">ViveroOnline</a>. Todos los derechos reservados.
        </p>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        let mapaEditar = null;
        let marcador = null;

        window.obtenerUbicacion = function() {
            const btn = document.getElementById('btn-ubicacion');
            const status = document.getElementById('ubicacion-status');

            if (!navigator.geolocation) {
                status.textContent = 'Tu navegador no soporta geolocalización.';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>Obteniendo...';

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    actualizarMapa(lat, lng);
                    btn.innerHTML = '<i class="fa fa-check mr-2"></i>Ubicación actualizada';
                    btn.classList.replace('btn-outline-success', 'btn-success');
                    status.textContent = `Lat: ${lat.toFixed(5)}, Lng: ${lng.toFixed(5)}`;
                    status.className = 'text-success small';
                },
                () => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa fa-map-marker-alt mr-2"></i>Actualizar ubicación';
                    document.getElementById('ubicacion-status').textContent = 'No se pudo obtener la ubicación.';
                    document.getElementById('ubicacion-status').className = 'text-danger small';
                },
                { enableHighAccuracy: true }
            );
        }

        function actualizarMapa(lat, lng) {
            document.getElementById('lat').value = lat;
            document.getElementById('lng').value = lng;

            const mapaDiv = document.getElementById('mapa-editar');
            mapaDiv.style.display = 'block';

            if (!mapaEditar) {
                mapaEditar = L.map('mapa-editar').setView([lat, lng], 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19, attribution: '© OpenStreetMap'
                }).addTo(mapaEditar);
            } else {
                mapaEditar.setView([lat, lng], 16);
            }

            if (marcador) mapaEditar.removeLayer(marcador);
            marcador = L.marker([lat, lng], { draggable: true }).addTo(mapaEditar);
            marcador.bindPopup('📍 Arrastra para ajustar la ubicación').openPopup();
            marcador.on('dragend', (e) => {
                const p = e.target.getLatLng();
                document.getElementById('lat').value = p.lat;
                document.getElementById('lng').value = p.lng;
            });
        }

        window.mostrarUbicacionActual = function(lat, lng) {
            if (lat && lng) {
                const status = document.getElementById('ubicacion-status');
                status.textContent = `Ubicación registrada: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                status.className = 'text-success small';
                actualizarMapa(lat, lng);
            }
        }
    </script>

    <script type="module">
        import { auth, db, onAuthStateChanged, doc, getDoc, setDoc } from './firebase-config.js';

        const params = new URLSearchParams(window.location.search);
        const viveroId = params.get('id');

        if (!viveroId) window.location.href = 'index.html';

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }

            const viveroRef = doc(db, 'viveros', viveroId);
            const viveroSnap = await getDoc(viveroRef);

            if (!viveroSnap.exists()) { window.location.href = 'index.html'; return; }

            const v = viveroSnap.data();

            // Solo el dueño puede editar
            if (v.duenoId !== user.uid) {
                window.location.href = 'vivero-detalle.html?id=' + viveroId;
                return;
            }

            // Rellenar formulario
            document.getElementById('nombre').value = v.nombre || '';
            document.getElementById('descripcion').value = v.descripción || v.descripcion || '';
            document.getElementById('ciudad').value = v.ciudad || '';
            document.getElementById('direccion').value = v.dirección || v.direccion || '';
            document.getElementById('telefono').value = v.telefono || '';
            document.getElementById('email').value = v.email || '';
            document.getElementById('horario').value = v.horario || '';
            document.getElementById('lat').value = v.lat || '';
            document.getElementById('lng').value = v.lng || '';

            // Mostrar mapa si ya tiene ubicación
            if (v.lat && v.lng) {
                window.mostrarUbicacionActual(v.lat, v.lng);
            }

            // Guardar cambios
            document.getElementById('form-editar').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.querySelector('.btn-guardar');
                btn.textContent = 'Guardando...';
                btn.disabled = true;

                const latVal = document.getElementById('lat').value;
                const lngVal = document.getElementById('lng').value;

                try {
                    await setDoc(viveroRef, {
                        ...v,
                        nombre: document.getElementById('nombre').value,
                        descripción: document.getElementById('descripcion').value,
                        ciudad: document.getElementById('ciudad').value,
                        dirección: document.getElementById('direccion').value,
                        telefono: document.getElementById('telefono').value,
                        email: document.getElementById('email').value,
                        horario: document.getElementById('horario').value,
                        lat: latVal ? parseFloat(latVal) : v.lat || null,
                        lng: lngVal ? parseFloat(lngVal) : v.lng || null,
                    });

                    document.getElementById('success-msg').style.display = 'block';
                    btn.innerHTML = '<i class="fa fa-save mr-2"></i>Guardar Cambios';
                    btn.disabled = false;

                    setTimeout(() => {
                        window.location.href = 'vivero-detalle.html?id=' + viveroId;
                    }, 1500);

                } catch (error) {
                    document.getElementById('error-msg').textContent = 'Error: ' + error.message;
                    document.getElementById('error-msg').style.display = 'block';
                    btn.innerHTML = '<i class="fa fa-save mr-2"></i>Guardar Cambios';
                    btn.disabled = false;
                }
            });
        });
    </script>

</body>
</html>
