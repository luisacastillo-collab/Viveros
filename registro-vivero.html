<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>ViveroOnline - Registrar Vivero</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        .form-container {
            max-width: 700px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .form-group label {
            font-weight: 600;
            color: #555;
        }
        .form-control {
            padding: 12px;
            border-radius: 5px;
        }
        .btn-submit {
            background: #5cb85c;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
        }
        .btn-submit:hover { background: #4cae4c; }
        .success-msg {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        .error-msg {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N1E7KYXW6Q"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-N1E7KYXW6Q');
    </script>
</head>
<body>

    <!-- Navbar Start -->
    <div class="container-fluid p-0">
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark py-3 px-lg-5">
            <a href="index.html" class="navbar-brand">
                <h1 class="m-0 display-5 text-capitalize text-white"><span class="text-primary">Vivero</span>Online</h1>
            </a>
            <div class="collapse navbar-collapse justify-content-between px-3" id="navbarCollapse">
                <div class="navbar-nav mr-auto py-0">
                    <a href="index.html" class="nav-item nav-link">Inicio</a>
                    <a href="plants.html" class="nav-item nav-link">Plantas</a>
                    <a href="mapa_viveros.html" class="nav-item nav-link">Mapa</a>
                    <a href="contact.html" class="nav-item nav-link">Contacto</a>
                </div>
                <div class="d-flex align-items-center">
                    <a href="index.html" class="btn btn-outline-light btn-sm px-3 mr-2">← Volver</a>
                    <button id="btn-menu-usuario" onclick="openSidebar()" style="display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:5px;padding:6px;">
                        <span style="display:block;width:24px;height:2px;background:white;border-radius:2px;"></span>
                        <span style="display:block;width:24px;height:2px;background:white;border-radius:2px;"></span>
                        <span style="display:block;width:24px;height:2px;background:white;border-radius:2px;"></span>
                    </button>
                </div>
            </div>
        </nav>
    </div>
    <!-- Navbar End -->

    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-4"><span class="text-primary">Registra</span> tu Vivero</h2>
            <p class="text-center text-muted mb-4">Completa el formulario para que tu vivero aparezca en el directorio</p>

            <div id="success-msg" class="success-msg">
                ✅ ¡Vivero registrado exitosamente! Ya aparece en el directorio.
            </div>
            <div id="error-msg" class="error-msg"></div>

            <form id="form-vivero">
                <div class="form-group mb-3">
                    <label>Nombre del vivero *</label>
                    <input type="text" class="form-control" id="nombre" placeholder="Ej: Vivero El Paraíso" required>
                </div>
                <div class="form-group mb-3">
                    <label>Descripción *</label>
                    <textarea class="form-control" id="descripcion" rows="3" placeholder="Describe tu vivero, especialidades, etc." required></textarea>
                </div>
                <div class="form-group mb-3">
                    <label>Ciudad *</label>
                    <input type="text" class="form-control" id="ciudad" placeholder="Ej: Bogotá" required>
                </div>
                <div class="form-group mb-3">
                    <label>Dirección *</label>
                    <input type="text" class="form-control" id="direccion" placeholder="Ej: Calle 80 #45-20" required>
                </div>
                <div class="form-group mb-3">
                    <label>Teléfono *</label>
                    <input type="text" class="form-control" id="telefono" placeholder="Ej: +57 3005681085" required>
                </div>
                <div class="form-group mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" id="email" placeholder="vivero@gmail.com">
                </div>
                <div class="form-group mb-4">
                    <label>Horario de atención</label>
                    <input type="text" class="form-control" id="horario" placeholder="Ej: Lun-Sáb 8AM-6PM">
                </div>

                <!-- Ubicación -->
                <div class="form-group mb-4">
                    <label>Ubicación en el mapa</label>
                    <div class="d-flex align-items-center mb-2">
                        <button type="button" class="btn btn-outline-success mr-3" id="btn-ubicacion" onclick="obtenerUbicacion()">
                            <i class="fa fa-map-marker-alt mr-2"></i>Usar mi ubicación actual
                        </button>
                        <span id="ubicacion-status" class="text-muted small"></span>
                    </div>
                    <div id="mapa-registro" style="height: 250px; border-radius: 8px; display:none;"></div>
                    <input type="hidden" id="lat">
                    <input type="hidden" id="lng">
                </div>

                <button type="submit" class="btn-submit">Registrar Vivero</button>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        let mapaRegistro = null;
        let marcador = null;

        window.obtenerUbicacion = function() {
            const btn = document.getElementById('btn-ubicacion');
            const status = document.getElementById('ubicacion-status');

            if (!navigator.geolocation) {
                status.textContent = 'Tu navegador no soporta geolocalización.';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>Obteniendo ubicación...';
            status.textContent = '';

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;

                    document.getElementById('lat').value = lat;
                    document.getElementById('lng').value = lng;

                    const mapaDiv = document.getElementById('mapa-registro');
                    mapaDiv.style.display = 'block';

                    if (!mapaRegistro) {
                        mapaRegistro = L.map('mapa-registro').setView([lat, lng], 16);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            maxZoom: 19,
                            attribution: '© OpenStreetMap'
                        }).addTo(mapaRegistro);
                    } else {
                        mapaRegistro.setView([lat, lng], 16);
                    }

                    if (marcador) mapaRegistro.removeLayer(marcador);
                    marcador = L.marker([lat, lng], { draggable: true }).addTo(mapaRegistro);
                    marcador.bindPopup('📍 Aquí quedará tu vivero.<br><small>Arrastra el pin para ajustar.</small>').openPopup();

                    marcador.on('dragend', (e) => {
                        const pos = e.target.getLatLng();
                        document.getElementById('lat').value = pos.lat;
                        document.getElementById('lng').value = pos.lng;
                    });

                    btn.innerHTML = '<i class="fa fa-check mr-2"></i>Ubicación capturada';
                    btn.classList.replace('btn-outline-success', 'btn-success');
                    status.textContent = `Lat: ${lat.toFixed(5)}, Lng: ${lng.toFixed(5)}`;
                    status.className = 'text-success small';
                },
                (err) => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa fa-map-marker-alt mr-2"></i>Usar mi ubicación actual';
                    status.textContent = 'No se pudo obtener la ubicación. Verifica los permisos.';
                    status.className = 'text-danger small';
                },
                { enableHighAccuracy: true }
            );
        }
    </script>

    <script type="module">
        import { auth, db, onAuthStateChanged, collection, addDoc } from './firebase-config.js';
        import { initSidebar } from './js/sidebar.js';
        initSidebar();

        let currentUser = null;

        // Verificar login
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
            }
        });

        // Enviar formulario
        document.getElementById('form-vivero').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.querySelector('.btn-submit');
            btn.textContent = 'Guardando...';
            btn.disabled = true;

            try {
                const latVal = document.getElementById('lat').value;
                const lngVal = document.getElementById('lng').value;

                await addDoc(collection(db, 'viveros'), {
                    nombre: document.getElementById('nombre').value,
                    descripción: document.getElementById('descripcion').value,
                    ciudad: document.getElementById('ciudad').value,
                    dirección: document.getElementById('direccion').value,
                    telefono: document.getElementById('telefono').value,
                    email: document.getElementById('email').value,
                    horario: document.getElementById('horario').value,
                    duenoId: currentUser.uid,
                    duenoEmail: currentUser.email,
                    lat: latVal ? parseFloat(latVal) : null,
                    lng: lngVal ? parseFloat(lngVal) : null,
                    creadoEn: new Date()
                });

                document.getElementById('success-msg').style.display = 'block';
                document.getElementById('form-vivero').reset();
                btn.textContent = 'Registrar Vivero';
                btn.disabled = false;

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);

            } catch (error) {
                document.getElementById('error-msg').textContent = 'Error al registrar: ' + error.message;
                document.getElementById('error-msg').style.display = 'block';
                btn.textContent = 'Registrar Vivero';
                btn.disabled = false;
            }
        });
    </script>

</body>
</html>
